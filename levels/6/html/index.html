<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Уровень 6 - Финальный Босс</title>
    <link rel="stylesheet" href="../../../css/style.css?v=2">
    <link rel="stylesheet" href="../../../playerHUD/style.css?v=9">
    <link rel="stylesheet" href="../css/style.css?v=1">
</head>

<body>

    <canvas id="game-canvas"></canvas>

    <!-- Boss HP Bar (two halves) -->
    <div id="boss-hp-container">
        <div class="boss-hp-label">ФИНАЛЬНЫЙ БОСС</div>
        <div class="boss-bar-container">
            <div class="boss-bar-half" id="boss-hp-left" style="width:50%;"></div>
            <div class="boss-bar-gap"></div>
            <div class="boss-bar-half" id="boss-hp-right" style="width:50%;"></div>
        </div>
    </div>

    <!-- Player HUD -->
    <div id="ui-layer">
        <div class="hud-row">
            <span class="hud-label">HP</span>
            <div class="bar-container">
                <div class="bar-fill hp" id="hp-bar" style="width: 100%;"></div>
                <span class="bar-text" id="hp-val">50/50</span>
            </div>
        </div>
        <div class="hud-row">
            <span class="hud-label">ЩИТ</span>
            <div class="bar-container">
                <div class="bar-fill shield" id="shield-bar" style="width: 100%;"></div>
                <span class="bar-text" id="shield-val">5/5</span>
            </div>
        </div>
    </div>

    <div id="status-text"></div>

    <div id="death-overlay" style="display: none;">
        <div class="death-content">
            <h1 class="death-title">ВЫ ПОГИБЛИ</h1>
            <div class="death-buttons">
                <button class="death-btn restart-btn" onclick="location.reload()">РЕСТАРТ</button>
                <button class="death-btn exit-btn" onclick="location.href='../../ui_menu/html/index.html'">ВЫХОД</button>
            </div>
        </div>
    </div>

    <div id="victory-overlay" style="display: none;">
        <div class="death-content">
            <h1 class="victory-title">ПОБЕДА!</h1>
            <div class="death-buttons">
                <button class="death-btn exit-btn" onclick="location.href='../../ui_menu/html/index.html'">В МЕНЮ</button>
            </div>
        </div>
    </div>

    <script src="../../../js/sound.js?v=1"></script>
    <script src="../../../character/Player.js?v=8"></script>
    <script src="../../../enemies/CircleEnemy.js?v=2"></script>
    <script src="../../../enemies/BossLevel6.js?v=1"></script>
    <script src="../../../playerHUD/hud.js?v=2"></script>
    <script src="../js/main.js?v=1"></script>

</body>

</html>
